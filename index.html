<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BornoType Ad Tester</title>
    <style>
        body {
            background: #0f172a; /* Dark background */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .ad-slot {
            margin: 20px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px dashed #4ade80; /* Green dashed border to see the ad area */
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .label {
            font-size: 12px;
            color: #4ade80;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h1 { color: #4ade80; }
        p { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BornoType Ad Testing Page</h1>
        <p>Use this page to verify if your Adsterra units are active.</p>

        <div class="label">Unit 1: Top Banner (728x90)</div>
        <div class="ad-slot">
            <span>Waiting for 728x90 Banner...</span>
        </div>

        <div style="height: 300px; border: 1px solid #334155; margin: 20px 0; display:flex; align-items:center; justify-content:center;">
            Content Area (Simulated Converter Box)
        </div>

        <div class="label">Unit 2: Native Banner (4x1 Grid)</div>
        <div class="ad-slot">
            <span>Waiting for Native Ads...</span>
        </div>

        <div class="label">Unit 3: Rectangle (300x250)</div>
        <div class="ad-slot">
            <span>Waiting for 300x250 Banner...</span>
        </div>

    </div>

    </body>
</html>
